<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Hub - All Free AI Tools</title>
<meta name="theme-color" content="#5B5FEF">
<meta name="description" content="Discover the best free AI tools, organized by category.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg: #F4F3FB;
  --surface: #FFFFFF;
  --surface-alt: #ECEAF9;
  --ink: #1C1B2E;
  --ink-dim: #66647F;
  --primary: #5B5FEF;
  --primary-dim: #E6E5FC;
  --accent: #00C2A8;
  --accent-dim: #D9F7F1;
  --danger: #E0574A;
  --danger-dim: #FBE3E0;
  --border: #E4E2F5;
  --radius: 18px;
}
[data-theme="dark"]{
  --bg: #14131F;
  --surface: #1E1D2E;
  --surface-alt: #262538;
  --ink: #EDEBFA;
  --ink-dim: #9E9CB8;
  --primary: #8B8EF5;
  --primary-dim: #2C2B4A;
  --accent: #34E0C4;
  --accent-dim: #1B3B37;
  --danger: #F0776A;
  --danger-dim: #3D2320;
  --border: #302E44;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  color: var(--ink);
  font-family:'Inter', sans-serif;
  min-height:100vh;
  padding-bottom: 78px;
  transition: background 0.25s, color 0.25s;
}
h1,h2,h3,.brand-font{ font-family:'Manrope', sans-serif; }

/* Top bar */
.topbar{
  position:sticky; top:0; z-index:20;
  background: var(--bg);
  padding: 16px 20px 10px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.topbar h1{ font-size:22px; font-weight:800; margin:0; }
.icon-btn{
  width:40px; height:40px; border-radius:50%;
  border:none; background: var(--surface-alt); color: var(--ink);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer;
}
.icon-btn:active{ transform: scale(0.94); }
.back-row{ display:flex; align-items:center; gap:10px; }

.container{ max-width:520px; margin:0 auto; padding: 0 20px; }

/* Search */
.search-box{
  display:flex; align-items:center; gap:10px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: 30px; padding: 12px 16px; margin: 10px 20px 4px 20px;
}
.search-box input{
  border:none; outline:none; background:transparent; flex:1;
  font-size:15px; color:var(--ink); font-family:inherit;
}

/* Sections */
.section-header{
  display:flex; justify-content:space-between; align-items:center;
  margin: 22px 20px 10px 20px;
}
.section-header h2{ font-size:17px; font-weight:800; margin:0; }
.see-all{ font-size:13px; color:var(--primary); font-weight:700; background:none; border:none; cursor:pointer; }

.hlist{
  display:flex; gap:12px; overflow-x:auto; padding: 4px 20px 8px 20px;
  scrollbar-width:none;
}
.hlist::-webkit-scrollbar{ display:none; }

.tool-card{
  min-width:158px; max-width:158px;
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius); padding:14px; cursor:pointer;
  flex-shrink:0;
}
.tool-card.grid-card{ min-width:auto; max-width:none; width:100%; }
.tool-card .row-top{ display:flex; align-items:center; justify-content:space-between; }
.emoji-badge{
  width:36px; height:36px; border-radius:10px; background:var(--accent-dim);
  display:flex; align-items:center; justify-content:center; font-size:17px;
}
.tool-card h3{ font-size:14.5px; margin:10px 0 3px 0; font-weight:700; }
.tool-card p{ font-size:12px; color:var(--ink-dim); margin:0; line-height:1.4; height:32px; overflow:hidden; }
.badge{
  display:inline-block; margin-top:10px; font-size:10px; font-weight:800;
  letter-spacing:0.4px; padding:3px 9px; border-radius:20px;
}
.badge.free{ background: var(--accent-dim); color:#0A8F79; }
.badge.paid{ background: var(--danger-dim); color:var(--danger); }
[data-theme="dark"] .badge.free{ color: var(--accent); }

/* Category grid */
.cat-grid{
  display:grid; grid-template-columns: repeat(2, 1fr); gap:12px;
  padding: 4px 20px 8px 20px;
}
.cat-card{
  background: var(--surface); border:1px solid var(--border);
  border-radius: var(--radius); padding:16px; cursor:pointer;
}
.cat-card .emoji-badge{ background: var(--primary-dim); font-size:20px; }
.cat-card h3{ font-size:14.5px; margin:12px 0 0 0; font-weight:800; }

.grid-2{ display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; padding: 4px 20px 20px 20px; }

/* Tool detail */
.detail-hero{ padding: 6px 0 20px 0; }
.detail-icon{
  width:64px; height:64px; border-radius:20px; background:var(--primary-dim);
  display:flex; align-items:center; justify-content:center; font-size:30px; margin-bottom:16px;
}
.detail-hero h1{ font-size:24px; margin:0 0 8px 0; }
.chip{
  display:inline-block; background:var(--surface-alt); color:var(--ink-dim);
  font-size:12px; font-weight:700; padding:5px 12px; border-radius:20px; margin-right:8px;
}
.detail-desc{ font-size:15px; line-height:1.6; color:var(--ink-dim); margin:18px 0 26px 0; }
.btn{
  display:block; width:100%; text-align:center; text-decoration:none;
  background: var(--primary); color:#fff; font-weight:700; font-size:15px;
  padding:14px; border-radius:16px; border:none; cursor:pointer;
}
.btn.ghost{ background:transparent; border:1px solid var(--border); color:var(--ink); margin-top:10px; }
.detail-actions{ display:flex; gap:10px; margin-top: -8px; margin-bottom:16px; }
.note{ font-size:12px; color:var(--ink-dim); text-align:center; margin-top:14px; line-height:1.5; }

/* Empty state */
.empty{ text-align:center; padding:60px 20px; color:var(--ink-dim); font-size:14px; line-height:1.6; }

/* Settings */
.list-item{
  display:flex; align-items:center; gap:14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer;
}
.list-item .lbl{ flex:1; font-size:14.5px; font-weight:600; }
.radio-row{ display:flex; align-items:center; gap:12px; padding:10px 4px; }
.radio-row input{ width:18px; height:18px; accent-color: var(--primary); }
.group-label{ font-size:12px; font-weight:800; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.06em; margin:18px 4px 8px 4px; }

.prose{ font-size:14px; line-height:1.7; color:var(--ink-dim); white-space:pre-wrap; }

/* Bottom nav */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  background: var(--surface); border-top:1px solid var(--border);
  display:flex; padding: 8px 6px calc(8px + env(safe-area-inset-bottom, 0px)) 6px;
}
.nav-btn{
  flex:1; background:none; border:none; display:flex; flex-direction:column;
  align-items:center; gap:3px; padding:6px 2px; color:var(--ink-dim); cursor:pointer;
  font-family:inherit; font-size:11px; font-weight:700;
}
.nav-btn.active{ color: var(--primary); }
.nav-btn .ico{ font-size:20px; }

.hidden{ display:none !important; }
</style>
</head>
<body data-theme="light">

<div id="topbarHost"></div>
<div id="page" class="container"></div>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-btn" data-tab="home"><span class="ico">🏠</span>Home</button>
  <button class="nav-btn" data-tab="favorites"><span class="ico">❤️</span>Favorites</button>
  <button class="nav-btn" data-tab="recent"><span class="ico">🕘</span>Recent</button>
  <button class="nav-btn" data-tab="settings"><span class="ico">⚙️</span>Settings</button>
</nav>

<script src="tools-data.js"></script>
<script>
/* ---------- storage helpers (plain localStorage — this is a real website, not a Claude artifact) ---------- */
const LS = {
  favorites(){ return JSON.parse(localStorage.getItem('aihub_favorites') || '[]'); },
  setFavorites(v){ localStorage.setItem('aihub_favorites', JSON.stringify(v)); },
  recents(){ return JSON.parse(localStorage.getItem('aihub_recents') || '[]'); },
  addRecent(id){
    let r = LS.recents().filter(x => x !== id);
    r.unshift(id);
    if(r.length > 15) r = r.slice(0, 15);
    localStorage.setItem('aihub_recents', JSON.stringify(r));
  },
  theme(){ return localStorage.getItem('aihub_theme') || 'system'; },
  setTheme(v){ localStorage.setItem('aihub_theme', v); }
};

function applyTheme(){
  const t = LS.theme();
  let effective = t;
  if(t === 'system'){
    effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.body.setAttribute('data-theme', effective);
}
applyTheme();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if(LS.theme() === 'system') applyTheme();
});

function toggleFavorite(id){
  let f = LS.favorites();
  if(f.includes(id)) f = f.filter(x => x !== id);
  else f.push(id);
  LS.setFavorites(f);
  return f.includes(id);
}

/* ---------- routing ---------- */
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

document.getElementById('bottomNav').addEventListener('click', (e) => {
  const btn = e.target.closest('.nav-btn');
  if(!btn) return;
  const tab = btn.dataset.tab;
  location.hash = tab === 'home' ? '#/' : '#/' + tab;
});

function currentRoute(){
  const hash = location.hash || '#/';
  const parts = hash.replace('#/', '').split('/').filter(Boolean);
  return parts;
}

function setTopbar(html){
  document.getElementById('topbarHost').innerHTML = html;
}
function setPage(html){
  document.getElementById('page').innerHTML = html;
  window.scrollTo(0, 0);
}
function setActiveNav(tab){
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
}

function render(){
  const parts = currentRoute();
  if(parts.length === 0){ renderHome(); setActiveNav('home'); return; }
  if(parts[0] === 'category'){ renderCategory(decodeURIComponent(parts[1] || '')); setActiveNav(''); return; }
  if(parts[0] === 'tool'){ renderToolDetail(parts[1]); setActiveNav(''); return; }
  if(parts[0] === 'favorites'){ renderFavorites(); setActiveNav('favorites'); return; }
  if(parts[0] === 'recent'){ renderRecents(); setActiveNav('recent'); return; }
  if(parts[0] === 'settings'){ renderSettings(); setActiveNav('settings'); return; }
  if(parts[0] === 'about'){ renderAbout(); setActiveNav(''); return; }
  if(parts[0] === 'privacy'){ renderPrivacy(); setActiveNav(''); return; }
  if(parts[0] === 'search'){ renderSearch(); setActiveNav(''); return; }
  renderHome(); setActiveNav('home');
}

/* ---------- shared renderers ---------- */
function toolCardHtml(t, gridMode){
  const fav = LS.favorites().includes(t.id);
  return `
    <div class="tool-card ${gridMode ? 'grid-card' : ''}" onclick="location.hash='#/tool/${t.id}'">
      <div class="row-top">
        <div class="emoji-badge">${iconForCategory(t.category)}</div>
        ${fav ? '<span style="font-size:15px;">❤️</span>' : ''}
      </div>
      <h3>${escapeHtml(t.name)}</h3>
      <p>${escapeHtml(t.description)}</p>
      <span class="badge ${t.free ? 'free' : 'paid'}">${t.free ? 'FREE' : 'PAID'}</span>
    </div>`;
}

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

/* ---------- Home ---------- */
function renderHome(){
  setTopbar(`
    <div class="topbar">
      <h1 class="brand-font">✨ AI Hub</h1>
      <button class="icon-btn" onclick="location.hash='#/search'">🔍</button>
    </div>
  `);

  const trending = AI_TOOLS.filter(t => t.trending);
  const fresh = AI_TOOLS.filter(t => t.isNew);
  const popular = AI_TOOLS.slice(0, 8);

  let html = '';
  if(trending.length){
    html += `<div class="section-header"><h2>🔥 Trending AI Tools</h2></div>
      <div class="hlist">${trending.map(t => toolCardHtml(t, false)).join('')}</div>`;
  }
  if(fresh.length){
    html += `<div class="section-header"><h2>✨ New AI Tools</h2></div>
      <div class="hlist">${fresh.map(t => toolCardHtml(t, false)).join('')}</div>`;
  }
  html += `<div class="section-header"><h2>Categories</h2></div>
    <div class="cat-grid">
      ${CATEGORIES.map(c => `
        <div class="cat-card" onclick="location.hash='#/category/${encodeURIComponent(c.name)}'">
          <div class="emoji-badge">${c.icon}</div>
          <h3>${c.name}</h3>
        </div>`).join('')}
    </div>`;
  if(popular.length){
    html += `<div class="section-header"><h2>⭐ Popular AI Tools</h2></div>
      <div class="hlist">${popular.map(t => toolCardHtml(t, false)).join('')}</div>`;
  }
  setPage(html);
}

/* ---------- Search ---------- */
function renderSearch(){
  setTopbar(`
    <div class="topbar">
      <div class="back-row">
        <button class="icon-btn" onclick="history.back()">←</button>
        <h1 class="brand-font">Search</h1>
      </div>
    </div>
    <div class="search-box">
      🔍 <input id="searchInput" placeholder="Search AI tools..." oninput="runSearch(this.value)" autofocus>
    </div>
  `);
  setPage(`<div id="searchResults" class="grid-2"></div>`);
  runSearch('');
}
function runSearch(q){
  q = q.trim().toLowerCase();
  const results = q === '' ? [] : AI_TOOLS.filter(t =>
    t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q) || t.description.toLowerCase().includes(q)
  );
  const el = document.getElementById('searchResults');
  if(!el) return;
  if(q === ''){ el.innerHTML = `<div class="empty">Type to search across all AI tools</div>`; return; }
  if(results.length === 0){ el.innerHTML = `<div class="empty">No tools found.</div>`; return; }
  el.innerHTML = results.map(t => toolCardHtml(t, true)).join('');
}

/* ---------- Category ---------- */
function renderCategory(name){
  setTopbar(`
    <div class="topbar">
      <div class="back-row">
        <button class="icon-btn" onclick="location.hash='#/'">←</button>
        <h1 class="brand-font">${escapeHtml(name)}</h1>
      </div>
    </div>
  `);
  const tools = AI_TOOLS.filter(t => t.category === name);
  setPage(tools.length
    ? `<div class="grid-2">${tools.map(t => toolCardHtml(t, true)).join('')}</div>`
    : `<div class="empty">No tools in this category yet.</div>`);
}

/* ---------- Tool detail ---------- */
function renderToolDetail(id){
  const t = AI_TOOLS.find(x => x.id === id);
  if(!t){ location.hash = '#/'; return; }
  LS.addRecent(id);
  const fav = LS.favorites().includes(id);

  setTopbar(`
    <div class="topbar">
      <button class="icon-btn" onclick="history.back()">←</button>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn" onclick="shareTool('${id}')">↗️</button>
        <button class="icon-btn" id="favBtn" onclick="onFavClick('${id}')">${fav ? '❤️' : '🤍'}</button>
      </div>
    </div>
  `);

  setPage(`
    <div class="detail-hero">
      <div class="detail-icon">${iconForCategory(t.category)}</div>
      <h1>${escapeHtml(t.name)}</h1>
      <div>
        <span class="chip">${escapeHtml(t.category)}</span>
        <span class="badge ${t.free ? 'free' : 'paid'}">${t.free ? 'FREE' : 'PAID'}</span>
      </div>
      <p class="detail-desc">${escapeHtml(t.description)}</p>
      <a class="btn" href="${t.url}" target="_blank" rel="noopener">Open Official Website ↗</a>
      <p class="note">AI Hub links directly to the official site. We never host, copy, or bypass the service.</p>
    </div>
  `);
}
function onFavClick(id){
  const isFav = toggleFavorite(id);
  document.getElementById('favBtn').textContent = isFav ? '❤️' : '🤍';
}
function shareTool(id){
  const t = AI_TOOLS.find(x => x.id === id);
  const text = `${t.name} — ${t.description}\n${t.url}`;
  if(navigator.share){
    navigator.share({ title: t.name, text, url: t.url }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Link copied to clipboard'));
  }
}

/* ---------- Favorites ---------- */
function renderFavorites(){
  setTopbar(`<div class="topbar"><h1 class="brand-font">Favorites</h1></div>`);
  const ids = LS.favorites();
  const tools = AI_TOOLS.filter(t => ids.includes(t.id));
  setPage(tools.length
    ? `<div class="grid-2">${tools.map(t => toolCardHtml(t, true)).join('')}</div>`
    : `<div class="empty">No favorites yet.<br>Tap the heart icon on any tool to save it here.</div>`);
}

/* ---------- Recents ---------- */
function renderRecents(){
  setTopbar(`<div class="topbar"><h1 class="brand-font">Recently Opened</h1></div>`);
  const ids = LS.recents();
  const tools = ids.map(id => AI_TOOLS.find(t => t.id === id)).filter(Boolean);
  setPage(tools.length
    ? `<div class="grid-2">${tools.map(t => toolCardHtml(t, true)).join('')}</div>`
    : `<div class="empty">Tools you open will show up here.</div>`);
}

/* ---------- Settings ---------- */
function renderSettings(){
  setTopbar(`<div class="topbar"><h1 class="brand-font">Settings</h1></div>`);
  const theme = LS.theme();
  setPage(`
    <div class="group-label">Appearance</div>
    <label class="radio-row"><input type="radio" name="theme" value="system" ${theme==='system'?'checked':''} onchange="setThemeChoice(this.value)"> System default</label>
    <label class="radio-row"><input type="radio" name="theme" value="light" ${theme==='light'?'checked':''} onchange="setThemeChoice(this.value)"> Light</label>
    <label class="radio-row"><input type="radio" name="theme" value="dark" ${theme==='dark'?'checked':''} onchange="setThemeChoice(this.value)"> Dark</label>

    <div class="group-label">More</div>
    <div class="list-item" onclick="location.hash='#/about'"><span class="lbl">About</span> ›</div>
    <div class="list-item" onclick="location.hash='#/privacy'"><span class="lbl">Privacy Policy</span> ›</div>
    <div class="list-item" onclick="shareApp()"><span class="lbl">Share App</span> ↗</div>
    <div class="list-item" onclick="rateApp()"><span class="lbl">Rate App</span> ⭐</div>
  `);
}
function setThemeChoice(v){ LS.setTheme(v); applyTheme(); }
function shareApp(){
  const text = 'Check out AI Hub — discover the best free AI tools in one place.';
  if(navigator.share){ navigator.share({ title: 'AI Hub', text, url: location.href }).catch(()=>{}); }
  else { navigator.clipboard.writeText(text + ' ' + location.href).then(()=>alert('Copied to clipboard')); }
}
function rateApp(){
  alert('Once published, this button should open your Play Store listing. Update the link in the code after publishing.');
}

/* ---------- About / Privacy ---------- */
function renderAbout(){
  setTopbar(`
    <div class="topbar">
      <div class="back-row"><button class="icon-btn" onclick="history.back()">←</button><h1 class="brand-font">About</h1></div>
    </div>
  `);
  setPage(`
    <div class="detail-icon">✨</div>
    <h1 style="margin:0 0 4px 0;">AI Hub — All Free AI Tools</h1>
    <p style="color:var(--ink-dim); font-size:13px; margin:0 0 20px 0;">Version 1.0.0</p>
    <p class="prose">AI Hub helps you discover the best free and freemium AI tools, organized by category, all in one place. We do not host, copy, or re-sell any third-party service. Every tool opens its own official website, so you always deal directly with the provider you chose.

Tool entries use simple category icons rather than reproduced logos, out of respect for each provider's branding.</p>
  `);
}
function renderPrivacy(){
  setTopbar(`
    <div class="topbar">
      <div class="back-row"><button class="icon-btn" onclick="history.back()">←</button><h1 class="brand-font">Privacy Policy</h1></div>
    </div>
  `);
  setPage(`<p class="prose">${PRIVACY_TEXT}</p>`);
}
const PRIVACY_TEXT = `Privacy Policy — AI Hub

Last updated: 2026

AI Hub does not require an account and does not collect personal information on our servers.

What we store, and where:
- Your favorite tools, recently opened tools, and theme choice are saved only on your device (browser local storage). We do not upload this data anywhere.

What we don't do:
- We do not scrape, mirror, or bypass any third-party AI service.
- We do not collect names, emails, or account credentials.
- We do not sell or share data with advertisers (unless an ad unit is added later and disclosed separately).

Third-party websites:
When you tap "Open Official Website," you leave AI Hub and go to the provider's own site, which has its own privacy policy and terms. Please review those before using each service.

Contact:
For questions about this policy, contact the developer through the app's Play Store listing.`;

/* ---------- Register service worker ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
